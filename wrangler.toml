# Cloudflare Pages — proyecto nimpo-studio
# Deploy principal: Git conectado en el panel (push a main → build automático).
# Deploy manual/respaldo: npm run deploy  o  GitHub Actions (workflow_dispatch).

name = "nimpo-studio"
compatibility_date = "2024-07-01"
pages_build_output_dir = "./dist"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1